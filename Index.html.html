<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kelvin Route — Hakodate to Wakkanai 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #0B0F1A;
    color: #E8EAF0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: #0B0F1A;
    border-bottom: 1px solid #1E2535;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }
  .header-left {
    display: flex;
    flex-direction: column;
  }
  .route-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #F8F9FA;
  }
  .route-sub {
    font-size: 11px;
    color: #6B7A99;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-stats {
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .hstat {
    text-align: right;
  }
  .hstat-val {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #F8F9FA;
    line-height: 1;
  }
  .hstat-label {
    font-size: 10px;
    color: #6B7A99;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: #0F1520;
    border-right: 1px solid #1E2535;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    padding: 14px 16px 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #6B7A99;
    border-bottom: 1px solid #1E2535;
    flex-shrink: 0;
  }
  .leg-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #1E2535 transparent;
  }
  .leg-item {
    padding: 12px 16px;
    border-bottom: 1px solid #141B28;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .leg-item:hover { background: #141B28; }
  .leg-item.active { background: #161E30; }
  .leg-swatch {
    width: 4px;
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
    min-height: 36px;
  }
  .leg-content { flex: 1; min-width: 0; }
  .leg-id {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #6B7A99;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .leg-name {
    font-size: 13px;
    font-weight: 600;
    color: #E8EAF0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }
  .leg-stats {
    display: flex;
    gap: 12px;
  }
  .leg-stat {
    display: flex;
    flex-direction: column;
  }
  .leg-stat-val {
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .leg-stat-label {
    font-size: 9px;
    color: #6B7A99;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* MAP */
  .map-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #map {
    flex: 1;
  }

  /* ELEVATION PANEL */
  .elev-panel {
    height: 160px;
    background: #0F1520;
    border-top: 1px solid #1E2535;
    padding: 12px 16px 8px;
    flex-shrink: 0;
    position: relative;
  }
  .elev-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .elev-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6B7A99;
  }
  .elev-meta {
    font-size: 11px;
    color: #6B7A99;
    font-variant-numeric: tabular-nums;
  }
  .elev-meta span {
    color: #E8EAF0;
    font-weight: 600;
  }
  #elevChart {
    height: 110px !important;
  }
  .elev-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #3A4560;
    font-size: 12px;
    pointer-events: none;
  }

  /* LEAFLET OVERRIDES */
  .leaflet-control-attribution {
    background: rgba(11,15,26,0.8) !important;
    color: #3A4560 !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: #3A4560 !important; }
  .leaflet-control-zoom a {
    background: #0F1520 !important;
    color: #E8EAF0 !important;
    border-color: #1E2535 !important;
  }
  .leaflet-popup-content-wrapper {
    background: #0F1520;
    color: #E8EAF0;
    border: 1px solid #1E2535;
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip {
    background: #0F1520;
  }
  .popup-inner { padding: 4px 2px; }
  .popup-leg { font-size: 10px; color: #6B7A99; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .popup-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .popup-stats { display: flex; gap: 16px; }
  .popup-stat-val { font-size: 16px; font-weight: 700; line-height: 1; }
  .popup-stat-label { font-size: 9px; color: #6B7A99; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  /* scrollbar */
  .leg-list::-webkit-scrollbar { width: 4px; }
  .leg-list::-webkit-scrollbar-track { background: transparent; }
  .leg-list::-webkit-scrollbar-thumb { background: #1E2535; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="route-name">The Kelvin Route from Hakodate to Wakkanai 2026</div>
  </div>
  <div class="header-stats">

    <div class="hstat">

    <div class="hstat">
      <div class="hstat-val" style="font-size:13px;color:#6B7A99;">Hakodate<br>→ Wakkanai</div>

  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">Route Legs — click to explore</div>
    <div class="leg-list" id="legList"></div>
  </div>
  <div class="map-area">
    <div id="map"></div>
    <div class="elev-panel">
      <div class="elev-header">
        <div class="elev-title">Elevation Profile</div>
        <div class="elev-meta" id="elevMeta">Select a leg to view profile</div>
      </div>
      <canvas id="elevChart"></canvas>
      <div class="elev-hint" id="elevHint">Click a leg on the map or sidebar</div>
    </div>
  </div>
</div>

        ticks: { color: '#3A4560', font: { size: 9 }, callback: v => `${v}m` },
        grid: { color: '#1A2130' },
        border: { color: '#1E2535' }
      }
    }
  }
});

function selectLeg(i) {
  // Reset all
  polylines.forEach((pl, j) => {
    pl.setStyle({ weight: j === i ? 5 : 2, opacity: j === i ? 1 : 0.3 });
    if (j === i) pl.bringToFront();
  });

  // Sidebar highlight
  document.querySelectorAll('.leg-item').forEach((el, j) => {
    el.classList.toggle('active', j === i);
  });
  document.getElementById(`leg-item-${i}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  activeLeg = i;
  const leg = LEGS[i];

  // Fly to leg
  map.fitBounds(L.latLngBounds(leg.coords), { padding: [40, 40], animate: true, duration: 0.8 });

  // Update elevation chart
  document.getElementById('elevHint').style.display = 'none';
  document.getElementById('elevMeta').innerHTML = `
    <span>${leg.dist_km} km</span> &nbsp;·&nbsp; +<span>${leg.gain_m}m</span> ascent &nbsp;·&nbsp; -<span>${leg.loss_m}m</span> descent
  `;

  const gradient = ctx.createLinearGradient(0, 0, 0, 110);
  gradient.addColorStop(0, leg.color + '66');
  gradient.addColorStop(1, leg.color + '00');

  elevChart.data.labels = leg.distances.map(d => d.toFixed(2));
  elevChart.data.datasets[0].data = leg.elevation;
  elevChart.data.datasets[0].borderColor = leg.color;
  elevChart.data.datasets[0].backgroundColor = gradient;
  elevChart.update();
}
</script>
</body>
